# WildOS 几何稀疏导航图构建参数。
#
# 本文件按“数据从哪里来 → 如何解释地图 → 如何构建图 → 如何可靠运行与观测”
# 排列。ROS 2 按参数名称读取，而非 YAML 顺序读取，因此重新分组不会改变行为。
# 算法 1--5 对应 arXiv:2602.19308v1 的第 4-B 节。

graphnav_builder:
  ros__parameters:
    # ========================================================================
    # 1. ROS 接口与发布坐标系：决定节点连接哪些话题、图以何种 frame 发布。
    # ========================================================================
    # 订阅里程计的 ROS 话题；相对名称会自动带上 launch 的 namespace。
    odometry_topic: /dlio/odom_node/odom
    # 订阅局部 GridMap 通行性地图的 ROS 话题。
    traversability_map_topic: /elevation_mapping_node/elevation_map_filter
    # 发布 graphnav_msgs/NavigationGraph 的 ROS 话题。
    navigation_graph_topic: nav_graph
    # 图、节点和前沿统一表达的目标坐标系；通常设为 odom 或 map。
    global_frame: odom
    # 写入每条发布图消息的通行性类别名称，供下游规划器匹配类别。
    traversability_class: default

    # ========================================================================
    # 2. GridMap 基础语义：把原始图层分类为自由、障碍和未知单元。
    # ========================================================================
    # 必填：包含通行性数值的 GridMap 图层名称。
    traversability_layer: traversability
    # 可选：高程图层名称；为空时节点 Z 使用地图中心高程或回退值。elevation
    elevation_layer: ""
    # 可选：观测有效性掩码；为空时所有有限通行性值都视为已观测。
    observed_layer: ""
    # observed_layer 中大于等于此阈值的有限值才视为已观测。
    observed_threshold: 0.5
    # 通行性数值方向：higher_is_safer（高分安全）或 lower_is_safer（低分安全）。
    traversability_semantics: higher_is_safer
    # 自由/障碍分类阈值；比较方向由 traversability_semantics 决定。  #实体和 仿真主要是需要调节这个
    safe_threshold: 0.05
    # 未知值规则：non_finite，或 negative_or_non_finite（负有限值也算未知）。
    unknown_value_policy: non_finite

    # ========================================================================
    # 3. 局部地图几何与可靠范围：决定当前帧哪些栅格可用于建图。
    # ========================================================================
    # 可靠局部感知半径（米）；开启圆形裁切时，半径外单元变为未知前沿边界。
    local_map_radius: 8.0
    # true 时把矩形 GridMap 的可靠区域裁为以机器人为中心的可靠圆。
    crop_to_local_radius: true
    # 期望的 GridMap 分辨率（米/格），用于部署合同检查而非坐标计算。
    expected_map_resolution: 0.1
    # 输入与期望分辨率可接受的绝对误差（米/格）。
    resolution_tolerance: 0.001
    # true 时分辨率不匹配直接跳过该帧；false 时仅首次告警。
    strict_resolution_check: false

    # ========================================================================
    # 4. 持久图的节点生成与保留：采样、半径、前沿和工作空间限制。
    # ========================================================================
    # 节点自由半径的上限（米），也决定采样去冗余的最大覆盖范围。
    max_free_radius: 4.0
    # 机器人足迹需要的最小净空半径（米）；路径净空必须严格大于此值。
    traversable_radius: 0.65
    # 每帧尝试从自由格随机采样的次数；设为 0 可禁用随机补点。
    num_samples: 1000
    # 私有伪随机数生成器种子；固定值可使采样和测试结果可复现。
    random_seed: 7
    # true 时新样本也与本帧已接受节点去重；false 时只与上一帧节点比较。
    sample_against_new_nodes: true
    # 前沿邻接规则，只可设为 4（共享边）或 8（包含对角接触）。
    frontier_connectivity: 8
    # true：验证新前沿和历史前沿的 owner 安全直线；false：两类验证均跳过，
    # 新前沿在同一安全分量内直接取最近 owner。false 不能保证二者间直线安全。
    validate_frontier_paths: false 
    # true 时历史 frontier point 离开当前滚动 GridMap 仍保留；只有当前图能证明
    # 它已变 known、终点非法或路径失效时才删除。false 时看不见也立即删除。
    keep_frontiers_outside_grid: true
    # true 时历史 frontier point 若落入其他节点 explored_radius 会被清理；
    # false 时 explored_radius 只用于过滤新检测到的 frontier 候选，不清理历史点。
    prune_historical_frontiers_by_explored_radius: false
    # true 时无安全可达图节点会在安全机器人位置添加确定性锚点。
    ensure_robot_anchor: true
    # 持久节点允许的最小世界 X（米）；-.inf 表示不设下界。
    min_x: -.inf
    # 持久节点允许的最大世界 X（米）；.inf 表示不设上界。
    max_x: .inf
    # 持久节点允许的最小世界 Y（米）；-.inf 表示不设下界。
    min_y: -.inf
    # 持久节点允许的最大世界 Y（米）；.inf 表示不设上界。
    max_y: .inf

    # ========================================================================
    # 5. 图边与风险代价：决定边能否建立，以及已可通行边的规划代价。
    # ========================================================================
    # 候选图边的最大二维长度（米）；也是每个节点搜索邻居的半径。
    edge_radius: 8.0
    # true 时删除被当前局部可见障碍物或狭窄区域否定的历史边。
    validate_historical_edges: true
    # 边代价模式：euclidean，或 integrated_traversability（距离乘以平均风险）。
    edge_cost_mode: euclidean
    # 边代价中的距离计算维度：
    # - "3d"：使用节点中心 XYZ 欧氏距离，保留坡度/高差代价；
    # - "2d"：只使用 XY 平面距离，忽略节点高度差。
    # 注意：建边半径和碰撞检查仍按 XY 平面执行，此项只影响发布给规划器的边权重。
    edge_distance_mode: "3d"
    # integrated_traversability 的风险权重；0 表示退化为纯欧氏距离。
    traversability_cost_weight: 1.0
    # 可选：用于边风险代价的独立成本图层；为空时从通行性图推导风险。
    traversability_cost_layer: ""
    # 成本图层原始数值的下界；仅在 traversability_cost_layer 非空时使用。
    cost_min: 0.0
    # 成本图层原始数值的上界，必须严格大于 cost_min。
    cost_max: 1.0
    # true 表示成本值越大风险越高；false 表示成本值越大越安全。
    cost_higher_is_riskier: true
    # true 时拒绝超出 [cost_min, cost_max] 的有限成本值；false 时截断到该范围。
    strict_cost_range: false

    # ========================================================================
    # 6. 输入 QoS：必须与实际里程计/GridMap 发布端的 QoS 合同兼容。
    # ========================================================================
    # 里程计可靠性：best_effort 或 reliable。
    odom_qos_reliability: reliable
    # 里程计持久性：volatile 或 transient_local。
    odom_qos_durability: volatile
    # 里程计 QoS KEEP_LAST 队列深度，必须为正整数。
    odom_qos_depth: 30
    # GridMap 可靠性：best_effort 或 reliable。
    grid_qos_reliability: reliable
    # GridMap 持久性：volatile 或 transient_local。
    grid_qos_durability: volatile
    # GridMap QoS KEEP_LAST 队列深度，必须为正整数。
    grid_qos_depth: 1

    # ========================================================================
    # 7. 同步、处理队列与历史 TF：控制消息时序、背压和坐标变换等待策略。
    # ========================================================================
    # ApproximateTimeSynchronizer 内部每路订阅保存的候选消息数量。
    syncsub_queue_size: 30
    # 里程计与 GridMap 时间戳允许配对的最大差值（秒）。
    # syncsub_slop: 0.1 #这个是 scout 实体的值
    syncsub_slop: 0.05
    # 同步消息对进入重型建图处理前的 FIFO 缓冲容量。
    message_buffer_size: 1
    # true 时缓冲满后丢最旧项以优先实时性；false 时拒绝新项以保持严格时序。
    drop_old_messages: true
    # 处理缓冲区的定时器周期（秒）；每次最多处理一对消息。
    processing_timer_period: 0.02
    # true 时对不同输入 frame 查询历史 TF；false 时输入必须已在 global_frame。
    use_tf: true
    # TF 缓冲区保存历史变换的时长（秒）。
    tf_cache_duration: 10.0
    # 单次 TF 查询超时（秒）；0 表示立即返回，后续定时器会重试。
    tf_lookup_timeout: 0.0
    # 一对消息等待 TF 的最长实际时间（秒）；小于等于 0 表示不按年龄丢弃。
    tf_message_max_age: 1.0
    # 对同一最旧消息的最大 TF 查询次数；小于等于 0 表示不按次数丢弃。
    # tf_max_lookup_attempts: 20  #这个是 scout 实体的值
    tf_max_lookup_attempts: 50

    # ========================================================================
    # 8. 上游 GridMap 运行时合同：验证尺寸与前沿供给，尽早定位输入问题。
    # ========================================================================
    # true 时首张有效地图输出其 frame、尺寸、分辨率、边界状态和前沿数量。
    log_grid_map_contract: true
    # 期望 GridMap 的 length_x（米）；0 表示禁用 X 尺寸合同检查。
    expected_map_length_x: 20.0
    # 期望 GridMap 的 length_y（米）；0 表示禁用 Y 尺寸合同检查。
    expected_map_length_y: 20.0
    # 输入长度与期望长度可接受的绝对误差（米）。
    map_length_tolerance: 0.01
    # true 时地图尺寸不匹配拒绝该帧；false 时仅记录警告。
    strict_map_size_check: false
    # true 时没有 Free/Unknown 几何前沿候选会输出一次节流警告。
    warn_if_no_frontier_candidates: true
    # true 时没有 Free/Unknown 几何前沿候选会拒绝该帧。
    require_frontier_candidates: false

    # ========================================================================
    # 9. 图健康度诊断：只输出规模、连通性和耗时告警，不会裁剪持久图。
    # ========================================================================
    # 图诊断日志的最短输出间隔（秒）；小于等于 0 时禁用周期信息日志。
    graph_diagnostics_period: 5.0
    # 节点数达到此值时发出节流告警；不会删除节点。
    warn_node_count: 5000
    # 边数达到此值时发出节流告警；不会删除边。
    warn_edge_count: 50000
    # 单帧图更新耗时达到此值（秒）时发出节流告警。
    warn_update_duration: 0.5

    # ========================================================================
    # 10. 可选 RViz 调试显示：当前二维分类与稀疏全局记忆均不参与算法 1--5。
    # ========================================================================
    # true 时发布当前处理帧的平面 FREE/OBSTACLE/UNKNOWN 分类；仅有订阅者时构造。
    publish_local_classification_markers: true
    # 当前局部二维分类 MarkerArray 话题。
    local_classification_marker_topic: local_traversability_2d_markers
    # 当前局部二维分类最短发布周期（秒）；0 表示每个成功解码帧都可发布。
    local_classification_publish_period: 0.5
    # 分类平面相对 GridMap 中心 Z 的显示偏移（米），不参与节点高度或碰撞计算。
    local_classification_z_offset: 0.02

    # true 时维护并发布全局自由/障碍稀疏 RViz 标记；默认关闭以节省资源。
    publish_global_memory_markers: false
    # 发布 MarkerArray 调试可视化的 ROS 话题。
    global_memory_marker_topic: global_traversability_markers
    # RViz 显示抽样步长；每隔若干棋盘格显示一个单元，最小有效值为 1。
    global_memory_marker_stride: 1
    # 发布稀疏全局调试 MarkerArray 的周期（秒）。
    global_memory_publish_period: 1.0
    # 稀疏调试全局记忆允许创建的最大世界单元数，必须为正整数。
    global_memory_max_cells: 500000
