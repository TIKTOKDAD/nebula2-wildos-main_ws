# Model Params
frontier_ckpt: frontier_head.ckpt
traversability_ckpt: trav_head.ckpt
model_version: c-radio_v3-b
adaptor_version: null
use_naclip: true
use_summary_for_spatial: true
radio_dim: 768
static_scale_factor: 0.75
model_precision: FP16

# Nav Params
num_cameras: 1
cams_inverted: false
num_angular_bins: 16
reach_in_2D: true

# Nav graph params
frontiers_range: 9.0
traversability_class: default
heading_sim_thresh: 0.0
default_max_score: 0.3
std_for_default_scores: 80.0
std_for_frontier_heading: null
min_frontier_separation: 0.75

# Pixel Scoring Params
frontier_threshold: 0.6
frontier_opening_kernel_size: 20
traversability_threshold: 0.9
frontier_w: 2.0
goal_w: 3.0
reachability_w: 2.0
scoring_method: "MULTIPLICATIVE"
reach_scale: 0.25
compute_paths: true

# ROS2 frames and topics  scout
# parent_frame: odom
# cam_frame: camera_color_optical_frame
# camera_img_topic: /camera/camera/color/image_raw/compressed
# camera_info_topic: /camera/camera/color/camera_info
# odometry_topic: /dlio/odom_node/odom
# navigation_graph_topic: /nav_graph

# sim
parent_frame: odom
cam_frame: camera_0_color_optical_frame
camera_img_topic: /a300_0000/sensors/camera_0/color/compressed
camera_info_topic: /a300_0000/sensors/camera_0/color/camera_info
odometry_topic: /dlio/odom_node/odom
navigation_graph_topic: /nav_graph

# ROS2 Publisher topics
scored_navgraph_topic: /scored_nav_graph
model_viz_topic: /model_visualization
valid_geofrontiers_topic: /within_range_geofrontiers
score_ring_topic: /score_rings
graph_viz_topic: /nav_graph_viz

# /nav_graph_viz 是否压平成 XY 平面显示。
# true 适合调试图构建拓扑；false 使用 NavigationGraph 中真实 2.5D 高度。
flatten_nav_graph_viz: true

# 压平显示时使用的固定 Z，高一点可减少与 GridMap/Marker 的深度闪烁。
nav_graph_viz_z: 0.08



# # ROS2 subscriber params  scout
# qos_history_depth: 100
# syncsub_queue_size: 150
# syncsub_slop: 0.2

# sim
qos_history_depth: 150
syncsub_queue_size: 150
syncsub_slop: 0.03

# Object Search Config
object_search_config:
    text_queries:
        - "NASA logo"
    pixel_level_seg: false
    mask_threshold: 0.09
    obj_frontier_score: 0.9
    obj_trav_score: 0.9

# TFLookup Config
# tf_lookup_config:
#     buffer_size: 1
#     cache_time: 10
#     timer_duration: 0.05
#     lookup_timeout: 0
#     qos_history_depth: 100
#     wait_for_oldest: false
#     clear_buffer_on_process: true
#     spin_thread: false

# sim
tf_lookup_config:
    buffer_size: 1
    cache_time: 5
    timer_duration: 0.05
    lookup_timeout: 0
    qos_history_depth: 30
    wait_for_oldest: false
    clear_buffer_on_process: true
    spin_thread: false
